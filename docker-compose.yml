version: '3.8'

services:
  # Redis - Cache + Pub/Sub + Dedup
  redis:
    image: redis:7-alpine
    container_name: flashpoint_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # PostgreSQL with TimescaleDB
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: flashpoint_postgres
    environment:
      POSTGRES_DB: flashpoint
      POSTGRES_USER: flashpoint
      POSTGRES_PASSWORD: flashpoint
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashpoint"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: flashpoint_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  # RabbitMQ - Message Broker (optional - can use Redis instead)
  # rabbitmq:
  #   image: rabbitmq:3-management-alpine
  #   container_name: flashpoint_rabbitmq
  #   environment:
  #     RABBITMQ_DEFAULT_USER: flashpoint
  #     RABBITMQ_DEFAULT_PASS: flashpoint
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"
  #   volumes:
  #     - rabbitmq_data:/var/lib/rabbitmq
  #   restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  qdrant_data:
  # rabbitmq_data:

networks:
  default:
    name: flashpoint_network
