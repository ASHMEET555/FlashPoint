<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FLASHPOINT | INTEL COMMAND</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <!-- Leaflet map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ═══════════════════ HEADER ═══════════════════ -->
  <header class="top-bar">
    <div class="logo-block">
      <img src="/assets/logo.svg" alt="FlashPoint Logo" width="40" height="40" id="logo-img" />
      <h2 class="site-title">FLASHPOINT</h2>
    </div>

    <div class="marquee-wrap">
      <div class="marquee-track" id="marquee-text">
        REGION-4 MONITORING ACTIVE &nbsp;•&nbsp;
        <svg class="icon-inline" viewBox="0 0 24 24" fill="currentColor" style="color:#00e5ff">
          <path d="M6 2h12v2H6V2zm0 18h12v2H6v-2zm12-4V8l4 4-4 4zm-12 0l-4-4 4-4v8zm2-6h8v4H8v-4z"/>
        </svg>
        INTEL CORE ACTIVE
      </div>
    </div>

    <div class="status-block">
      <span class="text-cyan">● SYSTEM ONLINE</span><br />
      <span class="text-muted utc-clock" id="utc-clock">--:--:-- UTC</span>
    </div>
  </header>

  <hr class="divider" />

  <!-- ═══════════════════ MAIN THREE-COLUMN GRID ═══════════════════ -->
  <main class="dashboard-grid">

    <!-- ── COLUMN 1: LIVE FEED ── -->
    <section class="col col-feed">
      <div class="col-header">
        <svg class="col-icon" viewBox="0 0 24 24" fill="currentColor" style="color:#94a3b8">
          <path d="M5 18.08c-1.42-.87-2.67-2.07-3.64-3.5L3.63 12C4.38 13.06 5.34 13.93 6.45 14.5l-1.45 3.58zm12.55 0l-1.45-3.58c1.11-.57 2.06-1.44 2.82-2.5L22.64 14.58c-.97 1.43-2.22 2.63-3.64 3.5zM2 10.5C2 5.25 6.25 1 11.5 1S21 5.25 21 10.5c0 2.33-.82 4.47-2.19 6.13l-1.44-3.56c.49-.78.78-1.7.78-2.69 0-2.9-2.35-5.25-5.25-5.25S7.65 7.48 7.65 10.38c0 1 .29 1.91.78 2.69l-1.44 3.56C5.67 14.97 4.85 12.83 4.85 10.5zM11.5 8c1.38 0 2.5 1.12 2.5 2.5 0 1.05-.64 1.94-1.55 2.32l-1.9-4.72C10.66 8.04 11.07 8 11.5 8z"/>
        </svg>
        <h4 class="text-muted" style="margin:0;">LIVE FEED</h4>
      </div>

      <div class="feed-scroll" id="feed-container">
        <div class="feed-placeholder text-muted">⏳ Waiting for data stream...</div>
      </div>

      <button class="cyber-btn" id="generate-report-btn">GENERATE REPORT</button>

      <div id="report-section" class="hidden">
        <textarea class="report-preview" id="report-preview" readonly rows="10"></textarea>
        <button class="cyber-btn secondary" id="download-pdf-btn">⬇ DOWNLOAD PDF</button>
      </div>

      <!-- ── COMMODITY PRICES SIDEBAR ── -->
      <div class="commodity-widget" id="commodity-widget">
        <div class="commodity-header">
          <svg class="col-icon" viewBox="0 0 24 24" fill="currentColor" style="color:#ffd700">
            <path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/>
          </svg>
          <h4 style="margin:0; color:#ffd700;">COMMODITIES</h4>
        </div>
        <div class="commodity-grid" id="commodity-grid">
          <div class="commodity-loading">⏳ Loading prices...</div>
        </div>
        <div class="commodity-footer" id="commodity-footer">
          <span class="text-muted" style="font-size:0.7rem;">Last updated: --</span>
        </div>
      </div>
    </section>


    <!-- ── COLUMN 2: MAP ── -->
    <section class="col col-map">
      <div class="col-header">
        <svg class="col-icon" viewBox="0 0 24 24" fill="currentColor" style="color:#00e5ff">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
        </svg>
        <h4 class="text-cyan" style="margin:0;">OPERATIONAL PICTURE</h4>
      </div>

      <div id="map" class="map-container"></div>
    </section>


    <!-- ── COLUMN 3: INTEL CHAT ── -->
    <section class="col col-intel">
      <div class="col-header">
        <svg class="col-icon" viewBox="0 0 24 24" fill="currentColor" style="color:#00e5ff">
          <path d="M12 2c-5.33 0-8 3.16-8 5v6c0 1.35.73 2.64 1.97 3.5H3.5v2h17v-2h-2.47C19.27 15.64 20 14.35 20 13V7c0-1.84-2.67-5-8-5zm0 2c3.51 0 5.4 1.83 5.86 3H6.14c.46-1.17 2.35-3 5.86-3zM7 11.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5S9.33 13 8.5 13 7 12.33 7 11.5zm8.5 1.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
        </svg>
        <h4 class="text-cyan" style="margin:0;">INTEL ANALYSIS</h4>
      </div>

      <div class="chat-history" id="chat-history"></div>

      <form class="chat-form" id="chat-form" autocomplete="off">
        <input
          type="text"
          id="chat-input"
          class="chat-input"
          placeholder="Query the intelligence database..."
          autocomplete="off"
        />
        <button type="submit" class="cyber-btn send-btn" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </form>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
